groups:
  - name: theeyebeta.incidents
    interval: 30s
    rules:
      - alert: ServiceHealthProbeDown
        expr: probe_success{job="service-health"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.service }} health probe is failing"
          description: "{{ $labels.instance }} has failed the blackbox health probe for more than 2 minutes."

      - alert: CriticalServiceMetricsMissing
        expr: up{job=~"theeye-(oms|broker-adapter-alpaca|master-orchestrator)"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.service }} stopped emitting metrics"
          description: "Prometheus has been unable to scrape {{ $labels.job }} for more than 2 minutes."

      - alert: HighErrorRate
        expr: |
          (
            sum by (service) (rate(theeye_http_request_count_total{status=~"5.."}[5m]))
            /
            clamp_min(sum by (service) (rate(theeye_http_request_count_total[5m])), 1)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "{{ $labels.service }} has returned more than 5% 5xx responses over the last 5 minutes."

      - alert: OrderFlowLatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (service, le) (
              rate(theeye_http_request_latency_seconds_bucket{service=~"master-orchestrator|risk-service|compliance-service|oms|broker-adapter-alpaca"}[5m])
            )
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High order-flow latency on {{ $labels.service }}"
          description: "{{ $labels.service }} p95 request latency is above 2 seconds for 5 minutes."

      - alert: QueueDepthHigh
        expr: theeye_queue_depth{service=~"master-orchestrator|oms|broker-adapter-alpaca"} > 25
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Queue depth high on {{ $labels.service }}"
          description: "{{ $labels.service }} has more than 25 in-flight async handlers for 5 minutes."

      - alert: AuditChainBroken
        expr: probe_success{job="audit-chain-verify"} == 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Audit hash-chain verification failed"
          description: "Audit verification probe failed for {{ $labels.instance }}. Investigate hash mismatch or verifier availability immediately."
