modules:
  service_health:
    prober: http
    timeout: 5s
    http:
      method: GET
      valid_status_codes: [200, 503]
      preferred_ip_protocol: ip4

  audit_verify:
    prober: http
    timeout: 10s
    http:
      method: GET
      valid_status_codes: [200]
      fail_if_body_matches_regexp:
        - '"status"\s*:\s*"mismatch"'
      preferred_ip_protocol: ip4
