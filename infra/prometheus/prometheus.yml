global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: theeyebeta-dev
    env:     development

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # ── Prometheus self-monitoring ──────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ── OTel Collector (self-metrics exported on :8888) ─────────────────────────
  - job_name: blackbox-exporter
    static_configs:
      - targets: ["blackbox-exporter:9115"]

  - job_name: service-health
    metrics_path: /probe
    params:
      module: [service_health]
    static_configs:
      - targets: ["http://data-ingestion:7010/health"]
        labels:
          service: data-ingestion
      - targets: ["http://snapshot-packager:7011/health"]
        labels:
          service: snapshot-packager
      - targets: ["http://llm-gateway:4000/health"]
        labels:
          service: llm-gateway
      - targets: ["http://admin-service:7200/admin/health"]
        labels:
          service: admin-service
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: audit-chain-verify
    metrics_path: /probe
    params:
      module: [audit_verify]
    static_configs:
      - targets:
          - "http://audit-service:7110/audit/verify?from=1970-01-01T00:00:00Z&to=2999-12-31T23:59:59Z"
        labels:
          service: audit-service
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  # ── Application services (add targets as services come online) ──────────────
  - job_name: theeyebeta-services
    static_configs:
      - targets:
          - host.docker.internal:7010
        labels:
          service: data-ingestion
      - targets:
          - host.docker.internal:7011
        labels:
          service: snapshot-packager
