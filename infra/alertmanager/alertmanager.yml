global:
  resolve_timeout: 5m

route:
  receiver: operator-null
  group_by: ["alertname", "service", "portfolio_id"]
  group_wait: 0s
  group_interval: 2m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: operator-null
      group_wait: 0s
      repeat_interval: 30m

receivers:
  # This receiver intentionally has no external credentials. Production
  # notification delivery should be supplied by mounting an environment-specific
  # Alertmanager config with email, PagerDuty, or Slack credentials managed
  # outside git.
  - name: operator-null
