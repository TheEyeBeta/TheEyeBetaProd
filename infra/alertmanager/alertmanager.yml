global:
  resolve_timeout: 5m
  smtp_smarthost: "${SMTP_HOST}:${SMTP_PORT}"
  smtp_from: "${SMTP_FROM}"
  smtp_auth_username: "${SMTP_USER}"
  smtp_auth_password: "${SMTP_PASSWORD}"
  smtp_require_tls: true

route:
  receiver: operator-email
  group_by: ["alertname", "service", "portfolio_id"]
  group_wait: 0s
  group_interval: 2m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: operator-email
      group_wait: 0s
      repeat_interval: 30m

receivers:
  - name: operator-email
    email_configs:
      - to: "${ALERT_EMAIL_TO}"
        send_resolved: true
        headers:
          subject: "[TheEyeBeta {{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"

