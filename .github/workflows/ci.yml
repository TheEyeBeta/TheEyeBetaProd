name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Shared defaults ────────────────────────────────────────────────────────────
env:
  PYTHON_VERSION: "3.12"
  UV_CACHE_DIR: /tmp/.uv-cache
  FORCE_COLOR: "1"    # coloured output from ruff, pytest, etc.

# ─────────────────────────────────────────────────────────────────────────────
# Reusable setup steps are defined as defaults; jobs inline what they need.
# Job dependency graph:
#
#   lint ──┬── py-test ──┐
#          ├── py-int    ├── all-ok
#          ├── cpp-build─┤
#          ├── sbom ─────┤
#          └── docs ─────┘
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  # 1. lint — Python (ruff, black, mypy), C++ (clang-format), SQL (sqlfluff)
  # ═══════════════════════════════════════════════════════════════════════════
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for gitleaks)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dev dependencies
        run: uv sync --group dev

      # ── Python ──────────────────────────────────────────────────────────
      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

      - name: black --check
        run: uv run black --check .

      - name: mypy --strict (libs/ only)
        run: |
          if [ -d libs ] && find libs -name "*.py" -print -quit | grep -q .; then
            uv run mypy --strict libs/
          else
            echo "libs/ is empty — skipping mypy"
          fi

      # ── SQL ─────────────────────────────────────────────────────────────
      - name: sqlfluff lint (db/)
        run: |
          if [ -d db ] && find db -name "*.sql" -print -quit | grep -q .; then
            uv run sqlfluff lint --dialect postgres db/
          else
            echo "No SQL files in db/ — skipping sqlfluff"
          fi

      # ── C++ ─────────────────────────────────────────────────────────────
      - name: Install clang-format
        run: sudo apt-get install -y --no-install-recommends clang-format

      - name: clang-format --dry-run (cpp/)
        run: |
          if [ -d cpp ] && find cpp -name "*.cpp" -o -name "*.hpp" | grep -q .; then
            find cpp -type f \( -name "*.cpp" -o -name "*.hpp" -o -name "*.cc" -o -name "*.h" \) \
              -print0 | xargs -0 clang-format --dry-run --Werror
          else
            echo "No C++ files in cpp/ — skipping clang-format"
          fi


  # ═══════════════════════════════════════════════════════════════════════════
  # 2. py-test — Unit tests (no Docker infra required)
  # ═══════════════════════════════════════════════════════════════════════════
  py-test:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: pytest (unit — no I/O)
        run: |
          uv run pytest \
            -m "not integration and not smoke" \
            --tb=short -q \
            --junitxml=reports/unit.xml
          # Exit 5 = no tests collected; treat as success on empty repo.
        continue-on-error: false
        id: pytest_unit

      - name: Handle no-tests-collected (exit 5)
        if: failure() && steps.pytest_unit.outcome == 'failure'
        run: |
          code=$(uv run pytest -m "not integration and not smoke" --co -q 2>&1; echo $?)
          if echo "$code" | grep -q "^5$"; then
            echo "No tests collected — OK on empty repo."
          else
            exit 1
          fi

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: reports/unit.xml
          if-no-files-found: ignore


  # ═══════════════════════════════════════════════════════════════════════════
  # 3. py-int — Integration tests (testcontainers, Docker available)
  # ═══════════════════════════════════════════════════════════════════════════
  py-int:
    name: Python Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: pytest -m integration (testcontainers)
        env:
          LITELLM_DB_PASSWORD: integration_test_litellm
        run: |
          uv run pytest \
            services/data_ingestion/tests \
            services/agent_runtime/tests \
            services/risk_service/tests \
            -m integration \
            --tb=short -q \
            --junitxml=reports/integration.xml
        id: pytest_int

      - name: Handle no-tests-collected (exit 5)
        if: failure() && steps.pytest_int.outcome == 'failure'
        run: |
          uv run pytest \
            services/data_ingestion/tests \
            services/agent_runtime/tests \
            -m integration --co -q 2>&1 || true
          exit_code=$?
          [ "$exit_code" -eq 5 ] && echo "No integration tests yet — OK." || exit "$exit_code"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          path: reports/integration.xml
          if-no-files-found: ignore


  # ═══════════════════════════════════════════════════════════════════════════
  # 4. cpp-build — CMake + Conan matrix (Ubuntu 22.04, macOS 14 arm64)
  # ═══════════════════════════════════════════════════════════════════════════
  cpp-build:
    name: C++ Build (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            preset: linux-release
            conan_profile: default
          - os: macos-14
            preset: macos-arm64-release
            conan_profile: default

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for CMakePresets.json
        id: cmake_check
        run: |
          if [ -f CMakePresets.json ] || [ -f cpp/CMakePresets.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No CMakePresets.json found — C++ build is a no-op on this empty repo."
          fi

      # ── ccache ────────────────────────────────────────────────────────────
      - name: Set up ccache
        if: steps.cmake_check.outputs.exists == 'true'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.os }}-ccache-${{ hashFiles('cpp/**') }}
          restore-keys: ${{ matrix.os }}-ccache-

      # ── System deps ───────────────────────────────────────────────────────
      - name: Install build tools (Ubuntu)
        if: runner.os == 'Linux' && steps.cmake_check.outputs.exists == 'true'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build clang-format clang-tidy \
            libstdc++-12-dev pkg-config

      - name: Install build tools (macOS)
        if: runner.os == 'macOS' && steps.cmake_check.outputs.exists == 'true'
        run: |
          brew install cmake ninja ccache llvm pkg-config
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      # ── Python + Conan ────────────────────────────────────────────────────
      - name: Set up Python (for Conan)
        if: steps.cmake_check.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Conan packages
        if: steps.cmake_check.outputs.exists == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: ${{ matrix.os }}-conan2-${{ hashFiles('cpp/conanfile.py', 'cpp/conanfile.txt') }}
          restore-keys: ${{ matrix.os }}-conan2-

      - name: Install Conan
        if: steps.cmake_check.outputs.exists == 'true'
        run: |
          pip install --quiet conan
          conan profile detect --force

      # ── Configure + Build + Test ──────────────────────────────────────────
      - name: Conan install, CMake build, ctest (--preset ${{ matrix.preset }})
        if: steps.cmake_check.outputs.exists == 'true'
        working-directory: cpp
        env:
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
        run: |
          conan install . \
            -of=../build/${{ matrix.preset }} \
            --build=missing \
            --profile:build=${{ matrix.conan_profile }} \
            --profile:host=${{ matrix.conan_profile }} \
            -s build_type=Release
          cmake --preset ${{ matrix.preset }} \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build --preset ${{ matrix.preset }} \
            --parallel $(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 4)
          ctest --preset ${{ matrix.preset }} \
            --parallel $(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 4)

      - name: Upload build artefacts on failure
        if: failure() && steps.cmake_check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cpp-build-logs-${{ matrix.os }}
          path: |
            build/${{ matrix.preset }}/CMakeFiles/CMakeOutput.log
            build/${{ matrix.preset }}/CMakeFiles/CMakeError.log


  # ═══════════════════════════════════════════════════════════════════════════
  # 5. sbom — Software Bill of Materials via syft
  # ═══════════════════════════════════════════════════════════════════════════
  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SBOM with syft
        uses: anchore/sbom-action@v0
        with:
          path: .
          output-file: sbom.spdx.json
          format: spdx-json
          artifact-name: sbom-${{ github.sha }}.spdx.json
          upload-artifact: true
          upload-release-assets: false


  # ═══════════════════════════════════════════════════════════════════════════
  # 6. docs — Verify OpenAPI schemas are not stale
  # ═══════════════════════════════════════════════════════════════════════════
  docs:
    name: API Docs (OpenAPI staleness check)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Check OpenAPI schemas are up-to-date
        run: make docs-api-check


  # ═══════════════════════════════════════════════════════════════════════════
  # Sentinel — single check to add to GitHub branch-protection rules
  # Configure: Settings → Branches → Require status checks → "All checks passed"
  # ═══════════════════════════════════════════════════════════════════════════
  all-ok:
    name: All checks passed
    if: always()
    needs: [lint, py-test, py-int, cpp-build, sbom, docs]
    runs-on: ubuntu-latest

    steps:
      - name: Evaluate required job results
        env:
          RESULTS: >-
            lint=${{ needs.lint.result }}
            py-test=${{ needs.py-test.result }}
            py-int=${{ needs.py-int.result }}
            cpp-build=${{ needs.cpp-build.result }}
            sbom=${{ needs.sbom.result }}
            docs=${{ needs.docs.result }}
        run: |
          echo "Job results: $RESULTS"
          for result in $RESULTS; do
            job="${result%%=*}"
            status="${result##*=}"
            if [[ "$status" == "failure" || "$status" == "cancelled" ]]; then
              echo "✖ Required job failed: $job ($status)"
              exit 1
            fi
          done
          echo "✔ All required jobs passed."
