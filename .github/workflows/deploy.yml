name: Deploy → TheEyeBetaProd

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys simultaneously.
# If a second push lands while a deploy is in flight, it queues — never cancels.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Mac Mini (bare metal)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Tailscale ────────────────────────────────────────────────────────
      # Spins up an ephemeral node tagged tag:ci.
      # ACL allows tag:ci → tag:server:22 only.
      # Node is removed from the tailnet automatically when the job ends.
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret:    ${{ secrets.TS_OAUTH_SECRET }}
          tags:            tag:ci

      # ── 2. Deploy ───────────────────────────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          timeout:  120s
          script: |
            set -euo pipefail
            REPO="$HOME/TheEyeBeta2025/TheEyeBetaProd"

            echo "━━━ Pull latest ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            cd "$REPO"
            git fetch --all
            git reset --hard origin/main
            echo "HEAD: $(git log --oneline -1)"

            echo "━━━ Sync dependencies ━━━━━━━━━━━━━━━━━━━━━━━━"
            # --frozen: fail if uv.lock is out of date rather than silently updating it.
            # Update the lock file locally and commit before merging to main.
            uv sync --frozen

            echo "━━━ Restart services ━━━━━━━━━━━━━━━━━━━━━━━━━"
            sudo systemctl restart theeyebeta-admin theeyebeta-litellm

            echo "━━━ Health check ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            sleep 3
            FAILED=0
            for svc in theeyebeta-admin theeyebeta-litellm; do
              if systemctl is-active --quiet "$svc"; then
                echo "  ✓  $svc"
              else
                echo "  ✗  $svc — dumping status:"
                sudo systemctl status "$svc" --no-pager --lines=30
                FAILED=1
              fi
            done
            [ "$FAILED" -eq 0 ] || exit 1

            echo "━━━ Deploy complete ━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Deployed at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "Commit:      $(git log --oneline -1)"
