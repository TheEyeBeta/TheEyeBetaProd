name: Docker buildx + GHCR login
description: >
  Install QEMU (cross-compilation), configure Docker Buildx, and log in to
  ghcr.io. Reused by every image-building job in release.yml.

inputs:
  ghcr-token:
    description: GitHub token with packages:write permission (pass secrets.GHCR_TOKEN)
    required: true
  registry-owner:
    description: GitHub org or user that owns the GHCR namespace
    required: true

runs:
  using: composite
  steps:
    - name: Set up QEMU (cross-compilation support)
      uses: docker/setup-qemu-action@v3
      with:
        platforms: linux/amd64,linux/arm64

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: |
          image=moby/buildkit:latest
          network=host

    - name: Log in to ghcr.io
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ inputs.registry-owner }}
        password: ${{ inputs.ghcr-token }}
