# git-cliff configuration — generates CHANGELOG and GitHub Release notes
# from Conventional Commits. Called by .github/workflows/release.yml.
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
{{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`]({{ commit.id }}))
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = []
commit_parsers = [
  { message = "^feat",     group = "Features"         },
  { message = "^fix",      group = "Bug Fixes"        },
  { message = "^perf",     group = "Performance"      },
  { message = "^refactor", group = "Refactoring"      },
  { message = "^docs",     group = "Documentation"    },
  { message = "^test",     group = "Tests"            },
  { message = "^ci",       group = "CI / CD"          },
  { message = "^build",    group = "Build"            },
  { message = "^chore",    group = "Chores"           },
  # Ignore changelog-noise commits
  { message = "^chore\\(release\\)", skip = true      },
  { message = "^chore\\(deps\\)",    skip = true      },
  { message = "^Merge",              skip = true      },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = "alpha|beta|rc"
topo_order = false
sort_commits = "oldest"
