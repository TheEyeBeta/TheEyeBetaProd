# Chain of command for theeyebeta AI staff.
# reports_to: parent agent id, or null = reports directly to the human operator.
#
# Execution order for rollups is bottom-up (leaves → leads → master-orchestrator).

agents:
  master-orchestrator:
    reports_to: null
    department: top
    role: Chief orchestrator — synthesizes department briefings for the operator
    constitution_path: agents/top/master-orchestrator.agent.md
    model_default: claude-sonnet-4-6
    model_fallback: gpt-5

  markets-lead:
    reports_to: master-orchestrator
    department: markets
    role: Markets department head
    constitution_path: agents/markets/markets-lead.agent.md
    model_default: claude-sonnet-4-6
    model_fallback: gpt-5

  macro-lead:
    reports_to: markets-lead
  news-sentiment:
    reports_to: markets-lead
  technical-analyst:
    reports_to: markets-lead

  compliance-lead:
