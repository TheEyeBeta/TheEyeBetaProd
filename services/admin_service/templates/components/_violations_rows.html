{#-
  Guard-violation table rows. Returned standalone for paginate-append via
  ``hx-target="#violations-rows" hx-swap="beforeend"``.
-#}
{% for row in rows %}
  {% include "components/_violation_row.html" %}
{% else %}
  <tr data-empty="true">
    <td
      colspan="7"
      class="px-4 py-10 text-center text-sm text-slate-500 dark:text-slate-400"
    >
      No matching violations.
    </td>
  </tr>
{% endfor %}
