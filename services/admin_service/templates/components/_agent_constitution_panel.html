{#-
  "Constitution" right-pane tab body.

  Server emits the raw markdown inside a ``<script type="text/x-markdown">``
  block (browsers do **not** execute scripts whose type isn't JS). The
  body-level ``htmx:afterSwap`` listener defined in ``agents.html`` reads
  the script's ``textContent`` and renders it via markdown-it + highlight.js
  into the sibling ``[data-constitution-target]`` element.

  Context:
   * ``agent``                 — the selected agent.
   * ``constitution_content``  — markdown text.
   * ``constitution_path``     — display path.
   * ``constitution_error``    — optional non-404 read error.
-#}
<div data-test-id="agent-constitution-panel">
  <header class="mb-3 flex flex-wrap items-center justify-between gap-2 text-xs text-slate-500">
    <span>
      Source:
      <code class="font-mono text-[0.7rem] text-slate-700 dark:text-slate-200">{{ constitution_path }}</code>
    </span>
    <span class="italic">Rendered client-side · code blocks highlighted via highlight.js</span>
  </header>

  {% if constitution_error %}
    <p class="rounded-md border border-rose-300 bg-rose-50 px-3 py-2 text-sm text-rose-800 dark:border-rose-800 dark:bg-rose-900/30 dark:text-rose-200">
      Could not load constitution: {{ constitution_error }}
    </p>
  {% else %}
    <script
      type="text/x-markdown"
      data-constitution-source
      data-agent-id="{{ agent.id }}"
    >{{ constitution_content }}</script>

    <article
      data-constitution-target
      data-test-id="constitution-rendered"
      class="prose prose-slate max-w-none text-sm text-slate-800 dark:prose-invert dark:text-slate-200"
    >
      {#- Fallback if JS is disabled: render raw markdown. -#}
      <pre class="whitespace-pre-wrap break-words text-xs">{{ constitution_content }}</pre>
    </article>
  {% endif %}
</div>
