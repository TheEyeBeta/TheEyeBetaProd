{#-
  Agents sidebar (left pane). Each row is a button that swaps the detail
  pane via ``hx-target="#agent-detail"``. The "Run Now" icon opens the
  Run Now modal into ``#modal``.
-#}
<aside
  aria-label="Agents list"
  data-test-id="agent-list"
  class="overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm dark:border-slate-800 dark:bg-slate-900"
>
  <header class="border-b border-slate-200 px-4 py-2 text-xs font-semibold uppercase tracking-wide text-slate-500 dark:border-slate-800">
    Registry
  </header>
  <ul role="list" class="divide-y divide-slate-200 dark:divide-slate-800">
    {% for agent in agents %}
      <li
        id="agent-list-{{ agent.id }}"
        data-agent-id="{{ agent.id }}"
        data-active="{{ 'true' if agent.active else 'false' }}"
        class="flex items-center gap-2 px-3 py-2 hover:bg-slate-50 dark:hover:bg-slate-800/60"
      >
        <button
          type="button"
          hx-get="/admin/agents/fragments/{{ agent.id | urlencode }}/runs"
          hx-target="#agent-detail"
          hx-swap="outerHTML"
          hx-indicator="#agent-spinner-{{ agent.id }}"
          class="group flex flex-1 flex-col gap-0.5 text-left"
        >
          <span class="flex items-center gap-2">
            <span class="truncate text-sm font-semibold text-slate-900 group-hover:text-indigo-600 dark:text-slate-100 dark:group-hover:text-indigo-300">
              {{ agent.id }}
            </span>
            {% if not agent.active %}
              <span class="rounded bg-slate-200 px-1 py-0.5 text-[0.65rem] font-medium text-slate-700 dark:bg-slate-700 dark:text-slate-200">
                inactive
              </span>
            {% endif %}
          </span>
          <span class="truncate text-xs text-slate-500 dark:text-slate-400">
            {{ agent.department }} · {{ agent.role }}
          </span>
          <span class="flex items-center gap-2 text-[0.7rem] text-slate-400">
            {% if agent.success_rate_7d is not none %}
              {% set pct = (agent.success_rate_7d * 100) | round(0, 'floor') | int %}
              {% if pct >= 90 %}
                {% set sev = "low" %}
              {% elif pct >= 75 %}
                {% set sev = "medium" %}
              {% elif pct >= 50 %}
                {% set sev = "high" %}
              {% else %}
                {% set sev = "critical" %}
              {% endif %}
              <span class="severity-badge severity-{{ sev }}">
                {{ pct }}% ok
              </span>
            {% else %}
              <span class="text-slate-400">no recent runs</span>
            {% endif %}
            <span class="tabular-nums">{{ agent.runs_7d }} runs / 7d</span>
          </span>
        </button>
        <button
          type="button"
          aria-label="Run {{ agent.id }} now"
          title="Run Now"
          hx-get="/admin/agents/fragments/{{ agent.id | urlencode }}/run-modal"
          hx-target="#modal"
          hx-swap="innerHTML"
          class="rounded-md border border-slate-300 px-2 py-1 text-xs font-medium text-slate-700 hover:bg-indigo-50 hover:text-indigo-700 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-800 dark:hover:text-indigo-300"
        >
          ▶ Run
        </button>
        <span
          id="agent-spinner-{{ agent.id }}"
          class="htmx-indicator text-xs text-slate-400"
          aria-hidden="true"
        >…</span>
      </li>
    {% else %}
      <li class="px-3 py-6 text-center text-sm text-slate-500">No agents registered.</li>
    {% endfor %}
  </ul>
</aside>
