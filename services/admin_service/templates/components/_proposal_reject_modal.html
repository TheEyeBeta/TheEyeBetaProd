{#-
  Reject modal — ``review_notes`` is required (min_length=1 on the DTO).

  Context:
   * ``proposal`` — :class:`ProposalDetail`.
-#}
<div
  data-modal-card
  data-test-id="proposal-reject-modal"
  data-proposal-id="{{ proposal.id }}"
  class="w-full max-w-xl space-y-4 rounded-lg border border-slate-200 bg-white p-5 shadow-xl dark:border-slate-800 dark:bg-slate-900"
  role="dialog"
  aria-modal="true"
  aria-labelledby="proposal-reject-title"
>
  <header class="flex items-start justify-between gap-3">
    <div>
      <h2 id="proposal-reject-title" class="text-base font-semibold text-rose-700 dark:text-rose-300">
        Reject proposal
      </h2>
      <p class="text-xs text-slate-500">
        {{ proposal.category }} · {{ proposal.target }}
      </p>
    </div>
    <button
      type="button"
      onclick="window.adminShell && window.adminShell.closeModal();"
      class="rounded-md p-1 text-slate-400 hover:text-slate-700 dark:hover:text-slate-200"
      aria-label="Close modal"
    >×</button>
  </header>

  <form
    hx-post="/admin/proposals/fragments/{{ proposal.id }}/reject"
    hx-target="#proposal-card-{{ proposal.id }}"
    hx-swap="outerHTML"
    hx-on::after-request="if (event.detail.successful) window.adminShell && window.adminShell.closeModal();"
    class="space-y-3 text-sm"
  >
    <label class="block text-xs">
      <span class="block font-medium text-slate-600 dark:text-slate-300">
        Review notes <span class="text-rose-600">*</span>
      </span>
      <textarea
        name="review_notes"
        rows="4"
        minlength="1"
        maxlength="2000"
        required
        placeholder="Why is this proposal being rejected? (lands in the audit log)"
        class="mt-1 block w-full rounded-md border border-slate-300 px-2 py-1 text-sm focus:border-rose-500 focus:outline-none focus:ring-1 focus:ring-rose-500 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-100"
      ></textarea>
    </label>

    <div class="flex items-center justify-end gap-2 pt-1">
      <button
        type="button"
        onclick="window.adminShell && window.adminShell.closeModal();"
        class="rounded-md border border-slate-300 px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-50 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-800"
      >Cancel</button>
      <button
        type="submit"
        data-test-id="proposal-reject-submit"
        class="rounded-md bg-rose-600 px-3 py-1.5 text-sm font-semibold text-white hover:bg-rose-500"
      >Reject</button>
    </div>
  </form>
</div>
