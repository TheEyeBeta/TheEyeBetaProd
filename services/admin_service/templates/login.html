<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in · theeyebeta Admin</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="{{ static_url }}/style.css" />
    <script src="{{ static_url }}/js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com/3.4.10"></script>
    <script defer src="{{ static_url }}/js/app.js"></script>
  </head>
  <body class="flex min-h-full items-center justify-center bg-slate-50 dark:bg-slate-950">
    <main class="w-full max-w-sm rounded-lg border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900">
      <h1 class="mb-1 text-lg font-semibold text-slate-900 dark:text-slate-100">theeyebeta Admin</h1>
      <p class="mb-6 text-sm text-slate-600 dark:text-slate-400">Operator sign-in</p>

      <form id="login-form" class="space-y-4">
        <div>
          <label for="username" class="mb-1 block text-sm font-medium">Username</label>
          <input
            id="username"
            name="username"
            type="text"
            autocomplete="username"
            required
            class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"
          />
        </div>
        <div>
          <label for="password" class="mb-1 block text-sm font-medium">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
            class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"
          />
        </div>
        <p id="login-error" class="hidden text-sm text-rose-600" role="alert"></p>
        <button
          type="submit"
          class="w-full rounded-md bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-800 dark:bg-slate-100 dark:text-slate-900"
        >
          Sign in
        </button>
      </form>
    </main>

    <script>
      (function () {
        const form = document.getElementById("login-form");
        const errorEl = document.getElementById("login-error");
        const next = new URLSearchParams(window.location.search).get("next") || "/admin/";

        form.addEventListener("submit", async (evt) => {
          evt.preventDefault();
          errorEl.classList.add("hidden");
          const username = document.getElementById("username").value.trim();
          const password = document.getElementById("password").value;
          try {
            const resp = await fetch("/admin/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify({ username, password }),
            });
            if (!resp.ok) {
              const detail = await resp.json().catch(() => ({}));
              errorEl.textContent = detail.detail || "Sign-in failed";
              errorEl.classList.remove("hidden");
              return;
            }
            const data = await resp.json();
            if (window.adminShell && data.access_token) {
              window.adminShell.setAccessToken(data.access_token);
            }
            window.location.assign(next);
          } catch (err) {
            errorEl.textContent = "Network error — retry shortly";
            errorEl.classList.remove("hidden");
          }
        });
      })();
    </script>
  </body>
</html>
