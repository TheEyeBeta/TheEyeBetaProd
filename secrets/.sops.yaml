# SOPS creation rules for secrets/ directory.
#
# ── First-time setup (run once, on any machine with age installed) ────────────
#
#   1. Generate your age keypair:
#        age-keygen -o ~/.config/sops/age/keys.txt
#      The command prints: "Public key: age1..."
#
#   2. Copy that public key into this file (replace the placeholder below).
#
#   3. Save the PRIVATE key (contents of ~/.config/sops/age/keys.txt) into
#      1Password as a Secure Note titled "theeyebeta age key".
#
#   4. For CI, add the private-key content as a GitHub Actions secret: SOPS_AGE_KEY
#
# ── Adding a new team member ──────────────────────────────────────────────────
#
#   1. They generate their own keypair (step 1 above).
#   2. They share their PUBLIC key with you (safe to share).
#   3. Append their public key to the `age:` list below (comma-separated).
#   4. Re-encrypt all files: sops updatekeys secrets/dev.enc.yaml
#
# ── Rotating a key ────────────────────────────────────────────────────────────
#
#   Remove the old public key, add the new one, then:
#     sops updatekeys secrets/dev.enc.yaml
#
# ─────────────────────────────────────────────────────────────────────────────

creation_rules:
  - path_regex: \.enc\.yaml$
    age: >-
      age1PLACEHOLDER__REPLACE_WITH_OUTPUT_OF__age-keygen__PUBLIC_KEY_LINE
